<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Fortune Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">🎵 Fortune Tracker</span>
    <span id="versionBadge" class="version-badge"></span>
    <button id="settingsBtn" class="icon-btn" title="設定">⚙️</button>
  </div>

  <div id="updateBanner" class="update-banner" style="display:none"></div>

  <!-- 未授權頁 -->
  <div id="setupPage">
    <p class="hint">尚未授權。請前往 Fortune Tracker 網站，點擊「授權擴充功能」完成設定。</p>
    <button id="openAppBtn" class="btn primary">開啟網站</button>
  </div>

  <!-- 主頁 -->
  <div id="mainPage" style="display:none">
    <div id="status" class="status"></div>

    <!-- 個握區塊 -->
    <div class="section-block">
      <div class="section-label">個握</div>

      <div class="sub-label">抽選記錄</div>
      <button id="syncBtn"   class="btn primary">同步</button>
      <button id="scrapeBtn" class="btn success" style="display:none">開始抓取</button>
      <button id="verifyBtn"  class="btn secondary">驗證完整性</button>
      <button id="refetchBtn" class="btn warning"   style="display:none">補抓遺漏</button>

      <div class="sub-label">個握花費記錄</div>
      <button id="purchaseSyncBtn"    class="btn primary">同步</button>
      <button id="purchaseScrapeBtn"  class="btn success"    style="display:none">開始抓取</button>
      <button id="verifyPurchaseBtn"  class="btn secondary">驗證完整性</button>
      <button id="refetchPurchaseBtn" class="btn warning"    style="display:none">補抓遺漏</button>
    </div>

    <div class="section-divider"></div>

    <!-- 全握區塊 -->
    <div class="section-block">
      <div class="section-label">全握</div>
      <select id="fullGroup" class="range-input" style="width:100%;margin-bottom:6px">
        <option value="nogizaka46">乃木坂46</option>
        <option value="sakurazaka46">櫻坂46</option>
        <option value="hinatazaka46">日向坂46</option>
      </select>
      <div class="full-range">
        <input id="fullStart" type="number" class="range-input" placeholder="起始單 (留空=自動)" min="1" />
        <span>～</span>
        <input id="fullEnd"   type="number" class="range-input" placeholder="結束單 (留空=自動)" min="1" />
      </div>
      <div id="fullGroupHint" class="group-hint" style="display:none"></div>
      <button id="fullSyncBtn"   class="btn primary">全握同步</button>
      <button id="fullScrapeBtn" class="btn success" style="display:none">開始全握抓取</button>
    </div>

    <div class="section-divider"></div>

    <!-- 進度區塊（抓取時才顯示） -->
    <div id="progressSection" class="progress-section" style="display:none">
      <div class="progress-header">
        <span id="progressLabel">抓取中...</span>
        <button id="stopBtn" class="btn-stop" style="display:none">停止</button>
      </div>
      <div class="progress-bar-row">
        <div class="progress-bar-bg">
          <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
        <span id="progressPct" class="progress-pct">-</span>
      </div>
      <div id="progressDetail" class="progress-detail"></div>
      <div id="progressTimer" class="progress-timer" style="display:none"></div>
    </div>

    <!-- 操作記錄 -->
    <div class="log-section">
      <div class="log-header">📋 操作記錄</div>
      <div id="logList" class="log-list">
        <div class="log-empty">尚無記錄</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
